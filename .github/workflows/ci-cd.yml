name: HackForge CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Backend Tests ───
  backend-test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Start backend server
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: hackforge_test
          JWT_SECRET: test-secret-key
          ADMIN_EMAIL: admin@caseflow.io
          ADMIN_PASSWORD: admin123
        run: |
          cd backend
          uvicorn server:app --host 127.0.0.1 --port 8001 &
          echo $! > /tmp/server.pid
          sleep 5

      - name: Run backend tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: hackforge_test
          JWT_SECRET: test-secret-key
          ADMIN_EMAIL: admin@caseflow.io
          ADMIN_PASSWORD: admin123
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short -x

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

      - name: Lint backend
        run: |
          pip install ruff
          cd backend
          ruff check . --ignore E501,F841

  # ─── Frontend Tests ───
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Lint frontend
        run: |
          cd frontend
          npx eslint src/ --ext .js,.jsx --max-warnings=10

      - name: Run property tests
        run: |
          cd frontend
          yarn test --watchAll=false --coverage

      - name: Build frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost
        run: |
          cd frontend
          yarn build

  # ─── Build & Push Docker Images ───
  build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          build-args: |
            REACT_APP_BACKEND_URL=${{ secrets.REACT_APP_BACKEND_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy (Optional - Configure for your hosting) ───
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Images pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}"
          echo ""
          echo "To deploy on any server:"
          echo "  docker compose pull && docker compose up -d"
